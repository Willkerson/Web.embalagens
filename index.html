<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cia das Embalagens</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{font-family:sans-serif;background:#f5f5f5;}

header{
background:#2563eb;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
}

.hero{
background:#1e40af;
color:#fff;
padding:40px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#fff;
padding:15px;
border-radius:8px;
cursor:pointer;
}

.card:hover{transform:translateY(-5px);}

button{
margin-top:10px;
padding:8px;
background:#2563eb;
color:#fff;
border:none;
width:100%;
}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
}

.modal.active{display:flex;}

.modal-box{
background:#fff;
padding:20px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<div>📦 Cia das Embalagens</div>
<button onclick="scrollToContact()">Contato</button>
</header>

<div class="hero">
<h1>Catálogo de Embalagens</h1>
</div>

<div class="products" id="produtos"></div>

<footer id="contact" style="padding:20px;background:#111;color:#fff;">
WhatsApp: 11 97299-9835
</footer>

<div class="modal" id="modal">
<div class="modal-box">
<button onclick="fechar()">X</button>
<h2 id="titulo"></h2>
<p id="preco"></p>
</div>
</div>

<script>

const lista = [
{nome:"Caixa Nº1",preco:"R$2,00"},
{nome:"Caixa Nº2",preco:"R$3,00"}
];

function render(){
const div=document.getElementById("produtos");

lista.forEach(p=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${p.nome}</h3>
<p>${p.preco}</p>
<button>Ver</button>
`;

card.onclick=()=>abrir(p);

div.appendChild(card);
});
}

function abrir(p){
document.getElementById("titulo").textContent=p.nome;
document.getElementById("preco").textContent=p.preco;
document.getElementById("modal").classList.add("active");
}

function fechar(){
document.getElementById("modal").classList.remove("active");
}

function scrollToContact(){
document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}

render();

</script>

</body>
</html>
