<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CIA Embalagens — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Arial,sans-serif;background:#f0f4f9;color:#1a1f2e;min-height:100vh}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0057FF 0%,#003db3 100%)}
.login-card{background:#fff;border-radius:16px;padding:36px 32px;width:300px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.login-logo{width:52px;height:52px;background:#0057FF;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px;font-weight:700;color:#fff;letter-spacing:-1px}
.login-card h2{font-size:18px;font-weight:600;color:#1a1f2e;margin-bottom:4px}
.login-card p{font-size:13px;color:#6b7280;margin-bottom:24px}
.login-card input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;font-family:inherit;color:#1a1f2e;outline:none;transition:border-color .2s;margin-bottom:10px}
.login-card input:focus{border-color:#0057FF}
.token-label{font-size:11px;color:#9ca3af;text-align:left;display:block;margin-bottom:4px;margin-top:2px}
.btn-login{width:100%;margin-top:4px;padding:12px;background:#0057FF;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .2s}
.btn-login:hover{background:#003db3}
#login-erro{font-size:13px;color:#ef4444;margin-top:10px;min-height:18px}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}

/* HEADER */
header{background:#0057FF;color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-logo{font-weight:700;font-size:17px;letter-spacing:-.3px}
.header-sub{font-size:12px;opacity:.7}
.btn-cart{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;position:relative}
.btn-cart:hover{background:rgba(255,255,255,.25)}
.btn-cart svg{width:16px;height:16px}
#cart-count{background:#fff;color:#0057FF;border-radius:50%;width:18px;height:18px;font-size:11px;font-weight:700;display:none;align-items:center;justify-content:center;position:absolute;top:-4px;right:-4px}

/* BUSCA */
.search-bar{padding:12px 16px;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:56px;z-index:9}
.search-wrap{display:flex;align-items:center;gap:8px;background:#f3f4f6;border-radius:10px;padding:0 12px}
.search-wrap svg{width:16px;height:16px;color:#9ca3af;flex-shrink:0}
.search-wrap input{flex:1;border:none;background:transparent;padding:10px 0;font-size:14px;font-family:inherit;color:#1a1f2e;outline:none}
.search-wrap input::placeholder{color:#9ca3af}

/* RESUMO */
.resumo{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px}
.resumo-card{background:#fff;border-radius:12px;padding:12px;text-align:center;border:1px solid #e5e7eb}
.resumo-card .num{font-size:20px;font-weight:700}
.resumo-card .lbl{font-size:11px;color:#6b7280;margin-top:2px}
.num-ok{color:#059669}.num-warn{color:#d97706}.num-crit{color:#ef4444}

/* LISTA */
#lista{padding:0 16px 120px}
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid #e5e7eb;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.99)}
.card:hover{border-color:#c7d2fe;box-shadow:0 2px 8px rgba(0,87,255,.08)}
.card-bar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch}
.bar-ok{background:#059669}.bar-warn{background:#d97706}.bar-crit{background:#ef4444}
.card-info{flex:1;min-width:0}
.card-nome{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:12px;color:#6b7280;margin-top:2px}
.card-right{text-align:right;flex-shrink:0}
.card-estoque{font-size:18px;font-weight:700}
.card-un{font-size:11px;color:#9ca3af}
.est-ok{color:#059669}.est-warn{color:#d97706}.est-crit{color:#ef4444}
.empty{text-align:center;padding:48px 16px;color:#9ca3af}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:20}
.overlay.on{display:block}

/* PAINEL PRODUTO */
#painel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:0 20px 32px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.45,1);z-index:21;box-shadow:0 -4px 24px rgba(0,0,0,.12)}
#painel.open{transform:translateY(0)}
.drag-handle{width:36px;height:4px;border-radius:2px;background:#e5e7eb;margin:12px auto 20px}
#painel h3{font-size:17px;font-weight:600;margin-bottom:4px}
.painel-meta{font-size:13px;color:#6b7280;margin-bottom:16px}
.painel-row{display:flex;gap:12px;align-items:center;background:#f3f4f6;border-radius:12px;padding:12px;margin-bottom:16px}
.painel-row svg{width:20px;height:20px;color:#6b7280}
.painel-row-info{flex:1}
.painel-row-label{font-size:11px;color:#6b7280}
.painel-row-val{font-size:16px;font-weight:600;margin-top:1px}
.qtd-wrap{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.qtd-wrap label{font-size:13px;color:#6b7280;flex-shrink:0}
.qtd-wrap input{flex:1;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s}
.qtd-wrap input:focus{border-color:#0057FF}
.btns-row{display:flex;gap:10px;margin-bottom:12px}
.btns-row button{flex:1;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s}
.btns-row button:active{opacity:.8}
.btn-entrada{background:#059669;color:#fff}.btn-saida{background:#ef4444;color:#fff}
.btn-fechar{width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:12px;background:#fff;font-size:14px;font-family:inherit;cursor:pointer;color:#6b7280}
.btn-fechar:hover{background:#f9fafb}

/* CARRINHO PAINEL */
#cartPanel{position:fixed;inset:0;background:#fff;z-index:30;display:none;flex-direction:column}
#cartPanel.on{display:flex}
.cart-header{background:#0057FF;color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between}
.cart-header h3{font-size:17px;font-weight:600}
.btn-close-cart{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#cartList{flex:1;overflow-y:auto;padding:12px 16px}
.cart-item{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.cart-item-nome{font-size:14px;font-weight:500}
.cart-item-meta{font-size:12px;color:#6b7280;margin-top:2px}
.badge-tipo{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-entrada{background:#d1fae5;color:#065f46}.badge-saida{background:#fee2e2;color:#991b1b}
.btn-rm{background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px;margin-left:8px;font-size:20px;line-height:1}
.btn-rm:hover{color:#ef4444}
.cart-vazio{text-align:center;padding:60px 16px;color:#9ca3af}
.cart-footer{padding:16px;border-top:1px solid #e5e7eb}
.btn-salvar{width:100%;padding:14px;background:#0057FF;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .2s}
.btn-salvar:hover{background:#003db3}
.btn-salvar:disabled{background:#93aff7;cursor:not-allowed}
.btn-limpar{width:100%;margin-top:8px;padding:11px;background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:inherit;cursor:pointer;color:#6b7280}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1f2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:99;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">CE</div>
    <h2>CIA Embalagens</h2>
    <p>Painel administrativo</p>
    <input id="senhaInput" type="password" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')logar()">
    <span class="token-label">GitHub Token (para salvar movimentações)</span>
    <input id="tokenInput" type="password" placeholder="ghp_...">
    <button class="btn-login" onclick="logar()">Entrar</button>
    <p id="login-erro"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <div class="header-logo">CIA Embalagens</div>
      <div class="header-sub">Gestão de estoque</div>
    </div>
    <button class="btn-cart" onclick="abrirCart()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Carrinho
      <span id="cart-count">0</span>
    </button>
  </header>

  <div class="search-bar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="busca" placeholder="Buscar produto..." oninput="render()">
    </div>
  </div>

  <div class="resumo" id="resumo"></div>
  <div id="lista"></div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="fecharPainel()"></div>

<!-- PAINEL PRODUTO -->
<div id="painel">
  <div class="drag-handle"></div>
  <h3 id="p-nome"></h3>
  <p class="painel-meta" id="p-meta"></p>
  <div class="painel-row">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
    <div class="painel-row-info">
      <div class="painel-row-label">Estoque atual</div>
      <div class="painel-row-val" id="p-estoque"></div>
    </div>
    <div style="text-align:right">
      <div class="painel-row-label">Preço unit.</div>
      <div class="painel-row-val" id="p-preco"></div>
    </div>
  </div>
  <div class="qtd-wrap">
    <label>Quantidade</label>
    <input id="qtd" type="number" value="1" min="1" max="9999">
  </div>
  <div class="btns-row">
    <button class="btn-entrada" onclick="addCart('entrada')">＋ Entrada</button>
    <button class="btn-saida" onclick="addCart('saida')">－ Saída</button>
  </div>
  <button class="btn-fechar" onclick="fecharPainel()">Fechar</button>
</div>

<!-- CARRINHO -->
<div id="cartPanel">
  <div class="cart-header">
    <h3>Carrinho</h3>
    <button class="btn-close-cart" onclick="fecharCart()">✕</button>
  </div>
  <div id="cartList"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <button class="btn-salvar" id="btn-salvar" onclick="salvar()">Salvar movimentações</button>
    <button class="btn-limpar" onclick="limparCarrinho()">Limpar tudo</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ── CONFIG ── */
const REPO      = "Willkerson/Automacao-ConnectPlug";
const WORKFLOW  = "movimentar.yml";
const FILA_PATH = "fila/movimentacao.json";
const BRANCH    = "main";

/* ── HASH ── */
const SENHA_HASH = "158a323a7ba44870f23d96f1516dd70aa48e9a72db4ebb026b0a89e212a208ab";

async function hashSenha(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");
}

/* ── LOGIN ── */
async function logar() {
  const senha = document.getElementById("senhaInput").value;
  const token = document.getElementById("tokenInput").value.trim();
  const hash  = await hashSenha(senha);

  if (hash !== SENHA_HASH) {
    document.getElementById("login-erro").textContent = "Senha incorreta";
    setTimeout(() => document.getElementById("login-erro").textContent = "", 2000);
    return;
  }
  if (!token) {
    document.getElementById("login-erro").textContent = "Informe o GitHub Token";
    return;
  }

  sessionStorage.setItem("auth", "ok");
  sessionStorage.setItem("gh_token", token);
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display   = "flex";
  carregarProdutos();
}

document.addEventListener("DOMContentLoaded", () => {
  if (sessionStorage.getItem("auth") === "ok") {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display   = "flex";
    carregarProdutos();
  }
  document.getElementById("senhaInput").addEventListener("keydown", e => {
    if (e.key === "Enter") logar();
  });
});

/* ── PARSE ESTOQUE ── "28,00 un" → 28 */
function parseEst(val) {
  if (val === null || val === undefined) return 0;
  if (typeof val === "number") return val;
  const n = parseFloat(String(val).replace(/[^\d,\.]/g,"").replace(",","."));
  return isNaN(n) ? 0 : n;
}

function fmtEst(val) {
  const n = parseEst(val);
  return n % 1 === 0 ? String(n) : n.toFixed(2);
}

/* ── DADOS ── */
let produtos = [];
let carrinho = [];
let atual    = null;

/* ── CARREGAR JSON ── */
function carregarProdutos() {
  fetch("front-index/produtos.json?t=" + Date.now())
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(data => {
      produtos = Array.isArray(data) ? data : Object.values(data);
      render();
    })
    .catch(err => {
      document.getElementById("lista").innerHTML =
        `<div class="empty">Erro ao carregar produtos.json<br><small>${err.message}</small></div>`;
    });
}

/* ── CLASSE DE STATUS ── */
function classeEst(val) {
  const n = parseEst(val);
  if (n <= 0)  return "crit";
  if (n <= 10) return "warn";
  return "ok";
}

/* ── RENDER RESUMO ── */
function renderResumo() {
  const ok   = produtos.filter(p => parseEst(p.estoque) > 10).length;
  const warn = produtos.filter(p => { const e = parseEst(p.estoque); return e > 0 && e <= 10; }).length;
  const crit = produtos.filter(p => parseEst(p.estoque) <= 0).length;
  document.getElementById("resumo").innerHTML = `
    <div class="resumo-card"><div class="num num-ok">${ok}</div><div class="lbl">Em estoque</div></div>
    <div class="resumo-card"><div class="num num-warn">${warn}</div><div class="lbl">Atenção</div></div>
    <div class="resumo-card"><div class="num num-crit">${crit}</div><div class="lbl">Zerados</div></div>
  `;
}

/* ── RENDER LISTA ── */
function render() {
  renderResumo();
  const v  = (document.getElementById("busca").value || "").toLowerCase();
  const el = document.getElementById("lista");
  const lista = produtos.filter(p =>
    (p.nome || "").toLowerCase().includes(v) ||
    String(p.codigo || "").includes(v)
  );

  if (!lista.length) {
    el.innerHTML = `<div class="empty">Nenhum produto encontrado</div>`;
    return;
  }

  el.innerHTML = lista.map(p => {
    const cl    = classeEst(p.estoque);
    const est   = fmtEst(p.estoque);
    const preco = p.preco ? `R$ ${Number(p.preco).toFixed(2)}` : "—";
    const cat   = [p.categoria, p.subcategoria].filter(Boolean).join(" › ");
    return `
      <div class="card" onclick="openProduto('${p.codigo}')">
        <div class="card-bar bar-${cl}"></div>
        <div class="card-info">
          <div class="card-nome">${p.nome || "Sem nome"}</div>
          <div class="card-meta">${preco}${cat ? " · " + cat : ""}</div>
        </div>
        <div class="card-right">
          <div class="card-estoque est-${cl}">${est}</div>
          <div class="card-un">${p.unidade || "un"}</div>
        </div>
      </div>`;
  }).join("");
}

/* ── ABRIR PRODUTO ── */
function openProduto(codigo) {
  atual = produtos.find(p => String(p.codigo) === String(codigo));
  if (!atual) return;

  const cat = [atual.categoria, atual.subcategoria].filter(Boolean).join(" › ");
  document.getElementById("p-nome").textContent    = atual.nome || "";
  document.getElementById("p-meta").textContent    = cat || atual.marca || "";
  document.getElementById("p-estoque").textContent = fmtEst(atual.estoque) + " " + (atual.unidade || "un");
  document.getElementById("p-preco").textContent   = atual.preco ? `R$ ${Number(atual.preco).toFixed(2)}` : "—";
  document.getElementById("qtd").value = 1;

  document.getElementById("painel").classList.add("open");
  document.getElementById("overlay").classList.add("on");
}

function fecharPainel() {
  document.getElementById("painel").classList.remove("open");
  document.getElementById("overlay").classList.remove("on");
}

/* ── ADD CARRINHO ── */
function addCart(tipo) {
  const qtd = Math.max(1, Number(document.getElementById("qtd").value) || 1);
  carrinho.push({ codigo: atual.codigo, nome: atual.nome, qtd, tipo });
  atualizarBadge();
  fecharPainel();
  showToast(`${tipo === "entrada" ? "Entrada" : "Saída"} de ${qtd} adicionada`);
}

/* ── BADGE ── */
function atualizarBadge() {
  const badge = document.getElementById("cart-count");
  if (carrinho.length > 0) {
    badge.textContent    = carrinho.length;
    badge.style.display  = "flex";
  } else {
    badge.style.display  = "none";
  }
}

/* ── RENDER CARRINHO ── */
function renderCart() {
  const list   = document.getElementById("cartList");
  const footer = document.getElementById("cartFooter");

  if (!carrinho.length) {
    list.innerHTML    = `<div class="cart-vazio">Carrinho vazio</div>`;
    footer.style.display = "none";
    return;
  }

  footer.style.display = "block";
  list.innerHTML = carrinho.map((item, i) => `
    <div class="cart-item">
      <div style="flex:1;min-width:0">
        <div class="cart-item-nome">${item.nome}</div>
        <div class="cart-item-meta">#${item.codigo} · ${item.qtd} un</div>
      </div>
      <span class="badge-tipo badge-${item.tipo === 'entrada' ? 'entrada' : 'saida'}">${item.tipo}</span>
      <button class="btn-rm" onclick="removeItem(${i})" title="Remover">×</button>
    </div>
  `).join("");
}

function removeItem(i) {
  carrinho.splice(i, 1);
  atualizarBadge();
  renderCart();
}

function abrirCart() {
  renderCart();
  document.getElementById("cartPanel").classList.add("on");
}

function fecharCart() {
  document.getElementById("cartPanel").classList.remove("on");
}

function limparCarrinho() {
  if (!confirm("Limpar todos os itens?")) return;
  carrinho = [];
  atualizarBadge();
  renderCart();
}

/* ── SALVAR → commit fila + dispatch workflow ── */
async function salvar() {
  if (!carrinho.length) { showToast("Carrinho vazio"); return; }

  const token = sessionStorage.getItem("gh_token");
  if (!token) { showToast("Token não encontrado. Faça login novamente."); return; }

  const btn = document.getElementById("btn-salvar");
  btn.disabled    = true;
  btn.textContent = "Enviando…";

  try {
    /* 1. Busca SHA + conteúdo atual da fila */
    const filaUrl = `https://api.github.com/repos/${REPO}/contents/${FILA_PATH}?ref=${BRANCH}`;
    const getRes  = await fetch(filaUrl, {
      headers: { Authorization: "Bearer " + token, Accept: "application/vnd.github+json" }
    });

    let sha = null;
    let filaAtual = { itens: [] };

    if (getRes.ok) {
      const d  = await getRes.json();
      sha      = d.sha;
      filaAtual = JSON.parse(atob(d.content.replace(/\n/g, "")));
    }

    /* 2. Monta fila atualizada */
    const novos = carrinho.map(i => ({
      codigo: String(i.codigo),
      nome:   i.nome,
      qtd:    i.qtd,
      tipo:   i.tipo   // "entrada" ou "saida"
    }));

    const filaAtualizada = { itens: [...(filaAtual.itens || []), ...novos] };
    const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(filaAtualizada, null, 2))));

    /* 3. Commit */
    const putBody = {
      message: `fila: ${novos.length} movimentação(ões)`,
      content: b64,
      branch:  BRANCH
    };
    if (sha) putBody.sha = sha;

    const putRes = await fetch(filaUrl, {
      method:  "PUT",
      headers: { Authorization: "Bearer " + token, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
      body:    JSON.stringify(putBody)
    });

    if (!putRes.ok) {
      const e = await putRes.json();
      throw new Error(e.message || "Erro ao commitar fila");
    }

    /* 4. Dispara workflow imediatamente */
    const dispRes = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
      {
        method:  "POST",
        headers: { Authorization: "Bearer " + token, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
        body:    JSON.stringify({ ref: BRANCH })
      }
    );

    if (!dispRes.ok && dispRes.status !== 204) {
      const e = await dispRes.json().catch(() => ({}));
      throw new Error(e.message || "Erro ao disparar workflow");
    }

    /* 5. Limpa */
    carrinho = [];
    atualizarBadge();
    fecharCart();
    showToast("✓ Fila enviada! Workflow iniciado.");

  } catch (err) {
    console.error(err);
    showToast("Erro: " + err.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = "Salvar movimentações";
  }
}

/* ── TOAST ── */
let _tt;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove("show"), 2500);
}
</script>
