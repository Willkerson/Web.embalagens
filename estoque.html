<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CIA EMBALAGENS</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f3f4f6;
}

header{
  background:#0057FF;
  color:#fff;
  padding:12px;
  font-weight:bold;
}

input, button{
  font-size:16px;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:280px;
  text-align:center;
}

/* LISTA */
#app{display:none;padding:10px;}

.card{
  background:#fff;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.badge{
  padding:6px 10px;
  border-radius:20px;
  color:#fff;
  font-size:12px;
}

.green{background:#00b37e;}
.yellow{background:#f59e0b;}
.red{background:#ef4444;}

/* PAINEL */
#painel{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:16px;
  border-radius:20px 20px 0 0;
  transform:translateY(100%);
  transition:.3s;
}

#painel.open{
  transform:translateY(0);
}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.row button{
  flex:1;
  padding:12px;
  border:none;
  color:#fff;
  border-radius:10px;
}

.btn-green{background:#00b37e;}
.btn-red{background:#ef4444;}

/* CARRINHO */
#cart{
  position:fixed;
  top:0;
  right:0;
  width:100%;
  height:100%;
  background:#fff;
  display:none;
  padding:10px;
}

.item{
  border-bottom:1px solid #ddd;
  padding:10px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>LOGIN</h3>
    <input id="senha" type="password" placeholder="senha"><br><br>
    <button onclick="logar()">Entrar</button>
    <p id="erro" style="color:red"></p>
  </div>
</div>

<!-- APP -->
<div id="app">

<header>CIA EMBALAGENS</header>

<input id="busca" placeholder="Buscar..." oninput="render()">

<div id="lista"></div>

</div>

<!-- PAINEL -->
<div id="painel">
  <h3 id="nome"></h3>
  <p>Estoque: <span id="estoque"></span></p>
  <p>Preço: <span id="preco"></span></p>

  <input id="qtd" type="number" value="1" min="1">

  <div class="row">
    <button class="btn-green" onclick="add('entrada')">Entrada</button>
    <button class="btn-red" onclick="add('saida')">Saída</button>
  </div>

  <button onclick="fechar()">Fechar</button>
</div>

<!-- CARRINHO -->
<div id="cart">
  <h3>Carrinho</h3>
  <div id="cartList"></div>
  <button onclick="fecharCart()">Fechar</button>
</div>

<script>
/* LOGIN SHA256 */
const HASH = "158a323a7ba44870f23d96f1516dd70aa48e9a72db4ebb026b0a89e212a208ab";

async function sha(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function logar(){
  const s = document.getElementById("senha").value;
  const h = await sha(s);

  if(h === HASH){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    render();
  } else {
    document.getElementById("erro").textContent="Senha incorreta";
  }
}

/* DADOS */
let produtos = [
  {codigo:1,nome:"Caixa P",estoque:5,preco:10},
  {codigo:2,nome:"Caixa M",estoque:0,preco:15},
  {codigo:3,nome:"Caixa G",estoque:25,preco:20}
];

let atual = null;
let carrinho = [];

/* RENDER */
function render(){
  const v = document.getElementById("busca").value?.toLowerCase() || "";
  const el = document.getElementById("lista");
  el.innerHTML="";

  produtos
  .filter(p=>p.nome.toLowerCase().includes(v))
  .forEach(p=>{

    let c = "green";
    if(p.estoque<=0) c="red";
    else if(p.estoque<=10) c="yellow";

    el.innerHTML += `
      <div class="card" onclick="openP(${p.codigo})">
        <div>
          <b>${p.nome}</b><br>
          R$ ${p.preco}
        </div>

        <div class="badge ${c}">
          ${p.estoque}
        </div>
      </div>
    `;
  });
}

/* PAINEL */
function openP(id){
  atual = produtos.find(p=>p.codigo===id);

  document.getElementById("nome").textContent = atual.nome;
  document.getElementById("estoque").textContent = atual.estoque;
  document.getElementById("preco").textContent = atual.preco;

  document.getElementById("painel").classList.add("open");
}

function fechar(){
  document.getElementById("painel").classList.remove("open");
}

/* CARRINHO */
function add(tipo){
  const qtd = Number(document.getElementById("qtd").value);

  carrinho.push({
    nome:atual.nome,
    qtd,
    tipo
  });

  fechar();
  alert("Adicionado");
}

/* CART */
function abrirCart(){
  document.getElementById("cart").style.display="block";

  document.getElementById("cartList").innerHTML =
    carrinho.map(i=>`
      <div class="item">
        ${i.nome} - ${i.qtd} (${i.tipo})
      </div>
    `).join("");
}

function fecharCart(){
  document.getElementById("cart").style.display="none";
}
</script>

</body>
</html>
