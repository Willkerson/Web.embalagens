<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>CIA EMBALAGENS</title>

<link rel="manifest" href="manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Estoque">
<meta name="theme-color" content="#0057FF">

<style>
/* ===== SEU CSS (mantido) ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --azul:#0057FF;
  --verde:#00B37E;
  --verde-bg:#e6f7f2;
  --amarelo:#D97706;
  --amarelo-bg:#fef3c7;
  --vermelho:#E63946;
  --vermelho-bg:#fdecea;
  --bg:#F0F2F5;
  --borda:#E2E6EA;
  --texto:#111827;
  --sub:#6B7280;
  --branco:#fff;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--texto);
}

/* (mantive compacto — seu CSS pode continuar igual) */

#appContent { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="telaLogin">
  <div class="login-card">
    <h2>CIA EMBALAGENS</h2>
    <p>Digite a senha</p>

    <input id="senhaInput" type="password" placeholder="••••">
    <button class="btn-login" onclick="login()">Entrar</button>

    <div id="senhaErro" style="display:none;color:red;">Senha incorreta</div>
  </div>
</div>

<!-- APP -->
<div id="appContent">

<header>
  <div class="header-row">
    <h1>📦 CIA EMBALAGENS</h1>

    <div class="header-badges">
      <button id="btnHist" onclick="abrirHist()">📋</button>

      <!-- ✔ BOTÃO CERTO DO CARRINHO -->
      <button id="btnCarrinho">
        🛒 <span id="carrinhoCount">0</span>
      </button>
    </div>
  </div>
</header>

<!-- BUSCA -->
<div class="busca-wrap">
  <input id="busca" placeholder="Buscar...">
</div>

<!-- LISTA -->
<div id="resultados"></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- PAINEL PRODUTO -->
<div id="painel">
  <div class="handle"></div>

  <div id="painel-nome"></div>
  <div id="painel-cod"></div>
  <div id="painel-preco"></div>

  <div id="painel-est">0</div>

  <input id="qtd" type="number" value="1">

  <button onclick="add('entrada')">Entrada</button>
  <button onclick="add('saida')">Saída</button>

  <button onclick="fechar()">Fechar</button>
</div>

<!-- CARRINHO ✔ CORRIGIDO -->
<div id="carrinho-painel">
  <div class="tela-header">
    <h2>🛒 Carrinho</h2>
    <button onclick="fecharCarrinho()">✕</button>
  </div>

  <div id="listaCarrinho"></div>

  <button onclick="enviar()">Enviar tudo</button>
</div>

<!-- HISTÓRICO -->
<div id="hist-painel">
  <div class="tela-header">
    <h2>📋 Histórico</h2>
    <button onclick="fecharHist()">✕</button>
  </div>

  <div id="listaHist"></div>
</div>

</div>

<script src="app.js"></script>

<!-- ✔ EVENTO DO CARRINHO (IMPORTANTE) -->
<script>
document.getElementById("btnCarrinho").onclick = abrirCarrinho;
</script>

</body>
</html>
