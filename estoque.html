<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Estoque Pro</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --azul: #0057FF;
  --azul-light: #e8f0ff;
  --verde: #00B37E;
  --verde-light: #e6f7f2;
  --amarelo: #F59E0B;
  --amarelo-light: #fef3c7;
  --vermelho: #E63946;
  --vermelho-light: #fdecea;
  --cinza-bg: #F2F4F7;
  --cinza-borda: #E2E6EA;
  --cinza-texto: #6B7280;
  --texto: #111827;
  --branco: #ffffff;
  --sombra: 0 2px 8px rgba(0,0,0,0.08);
  --sombra-lg: 0 8px 32px rgba(0,0,0,0.14);
  --radius: 14px;
  --radius-sm: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: var(--cinza-bg);
  color: var(--texto);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--branco);
  border-bottom: 1px solid var(--cinza-borda);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  max-width: 680px;
  margin: 0 auto;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-inner h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--texto);
  display: flex;
  align-items: center;
  gap: 8px;
}

.badge-carrinho {
  background: var(--azul);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  border-radius: 20px;
  padding: 3px 10px;
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 5px;
}

/* ── MAIN ── */
main {
  max-width: 680px;
  margin: 0 auto;
  padding: 16px 16px 120px;
}

/* ── BUSCA ── */
.busca-wrap {
  position: relative;
  margin-bottom: 16px;
}

.busca-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--cinza-texto);
  width: 18px;
  height: 18px;
  pointer-events: none;
}

#busca {
  width: 100%;
  padding: 14px 14px 14px 44px;
  border-radius: var(--radius);
  border: 1.5px solid var(--cinza-borda);
  font-size: 16px;
  outline: none;
  background: var(--branco);
  color: var(--texto);
  box-shadow: var(--sombra);
  transition: border-color 0.2s;
}

#busca:focus {
  border-color: var(--azul);
}

#busca::placeholder { color: #9CA3AF; }

/* ── LABEL SEÇÃO ── */
.secao-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--cinza-texto);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

/* ── CARD PRODUTO ── */
.card-produto {
  background: var(--branco);
  border-radius: var(--radius);
  border: 1.5px solid var(--cinza-borda);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  box-shadow: var(--sombra);
}

.card-produto:active {
  background: var(--azul-light);
  border-color: var(--azul);
}

.card-produto-info {
  flex: 1;
  min-width: 0;
}

.card-produto-nome {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-produto-cat {
  font-size: 12px;
  color: var(--cinza-texto);
  margin-top: 2px;
}

.badge-estoque {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 58px;
}

.badge-num {
  font-size: 20px;
  font-weight: 800;
  line-height: 1;
}

.badge-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-radius: 20px;
  padding: 2px 8px;
}

/* cores por status */
.status-ok   .badge-num   { color: var(--verde); }
.status-ok   .badge-label { background: var(--verde-light); color: var(--verde); }
.status-low  .badge-num   { color: var(--amarelo); }
.status-low  .badge-label { background: var(--amarelo-light); color: #92400E; }
.status-zero .badge-num   { color: var(--vermelho); }
.status-zero .badge-label { background: var(--vermelho-light); color: var(--vermelho); }

.chevron {
  color: #D1D5DB;
  flex-shrink: 0;
}

/* ── VAZIO ── */
.vazio {
  text-align: center;
  padding: 40px 20px;
  color: var(--cinza-texto);
  font-size: 14px;
}

/* ── OVERLAY ── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 200;
  backdrop-filter: blur(2px);
}

/* ── PAINEL INFERIOR ── */
#painel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--branco);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  box-shadow: var(--sombra-lg);
  padding: 0 16px 24px;
  z-index: 300;
  display: none;
  max-width: 680px;
  margin: 0 auto;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
}

#painel.aberto {
  transform: translateY(0);
}

.painel-handle {
  width: 36px;
  height: 4px;
  background: #E2E6EA;
  border-radius: 99px;
  margin: 12px auto 16px;
}

.painel-header {
  margin-bottom: 16px;
}

.painel-nome {
  font-size: 18px;
  font-weight: 700;
  color: var(--texto);
  margin-bottom: 6px;
}

.painel-estoque-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.painel-estoque-num {
  font-size: 28px;
  font-weight: 800;
}

.painel-estoque-txt {
  font-size: 13px;
  color: var(--cinza-texto);
}

/* contador */
.contador-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  background: var(--cinza-bg);
  border-radius: var(--radius);
  padding: 6px;
  margin-bottom: 16px;
}

.btn-contador {
  background: var(--branco);
  border: 1.5px solid var(--cinza-borda);
  border-radius: var(--radius-sm);
  width: 48px;
  height: 48px;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--texto);
  font-weight: 700;
  flex-shrink: 0;
  transition: background 0.15s;
  user-select: none;
}

.btn-contador:active { background: var(--cinza-borda); }

#qtd {
  font-size: 26px;
  font-weight: 800;
  width: 80px;
  text-align: center;
  color: var(--texto);
}

/* botões ação */
.btn-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.btn {
  flex: 1;
  border: none;
  border-radius: var(--radius);
  padding: 16px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}

.btn:active { opacity: 0.85; transform: scale(0.98); }

.btn-verde   { background: var(--verde); color: #fff; }
.btn-vermelho{ background: var(--vermelho); color: #fff; }
.btn-fechar  { background: var(--cinza-bg); color: var(--cinza-texto); width: 100%; border: none; border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; }

/* ── CARRINHO PAINEL ── */
#carrinho-painel {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--branco);
  z-index: 400;
  flex-direction: column;
}

#carrinho-painel.aberto { display: flex; }

.carrinho-header {
  padding: 16px;
  border-bottom: 1px solid var(--cinza-borda);
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}

.carrinho-header h2 {
  font-size: 17px;
  font-weight: 700;
}

.btn-fechar-carrinho {
  background: var(--cinza-bg);
  border: none;
  border-radius: 99px;
  width: 32px;
  height: 32px;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--cinza-texto);
}

.carrinho-lista {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}

.carrinho-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--cinza-borda);
}

.carrinho-item-nome {
  font-size: 14px;
  font-weight: 600;
}

.carrinho-item-qtd {
  font-size: 13px;
  color: var(--cinza-texto);
  margin-top: 2px;
}

.carrinho-badge {
  font-size: 13px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 99px;
}

.badge-entrada { background: var(--verde-light); color: var(--verde); }
.badge-saida   { background: var(--vermelho-light); color: var(--vermelho); }

.carrinho-footer {
  padding: 16px;
  border-top: 1px solid var(--cinza-borda);
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}

.btn-enviar {
  width: 100%;
  background: var(--azul);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 17px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-enviar:active { opacity: 0.85; }

.carrinho-vazio {
  text-align: center;
  padding: 60px 20px;
  color: var(--cinza-texto);
  font-size: 14px;
}

</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>📦 Estoque Pro</h1>
    <div class="badge-carrinho" id="btnCarrinho">
      🛒 <span id="carrinhoCount">0</span>
    </div>
  </div>
</header>

<main>
  <div class="busca-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="busca" placeholder="Buscar produto..." autocomplete="off">
  </div>

  <div class="secao-label">Produtos</div>
  <div id="resultados"></div>
</main>

<!-- overlay -->
<div id="overlay" onclick="fechar()"></div>

<!-- PAINEL -->
<div id="painel">
  <div class="painel-handle"></div>

  <div class="painel-header">
    <div class="painel-nome" id="nome"></div>
    <div class="painel-estoque-row">
      <div class="painel-estoque-num" id="estoque-num" style="color:var(--verde)">—</div>
      <div class="painel-estoque-txt">em estoque</div>
    </div>
  </div>

  <div class="contador-wrap">
    <button class="btn-contador" onclick="menos()">−</button>
    <div id="qtd">1</div>
    <button class="btn-contador" onclick="mais()">+</button>
  </div>

  <div class="btn-row">
    <button class="btn btn-verde"    onclick="add('entrada')">↑ Entrada</button>
    <button class="btn btn-vermelho" onclick="add('saida')">↓ Saída</button>
  </div>

  <button class="btn-fechar" onclick="fechar()">Cancelar</button>
</div>

<!-- CARRINHO PAINEL -->
<div id="carrinho-painel">
  <div class="carrinho-header">
    <h2>🛒 Carrinho</h2>
    <button class="btn-fechar-carrinho" onclick="fecharCarrinho()">✕</button>
  </div>
  <div class="carrinho-lista" id="listaCarrinho"></div>
  <div class="carrinho-footer">
    <button class="btn-enviar" onclick="enviar()">Enviar tudo</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
