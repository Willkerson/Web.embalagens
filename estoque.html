<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Estoque Pro</title>

<style>

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, Arial;
background:#f4f6f8;
color:#1d1d1f;
}

header{
padding:16px;
font-size:20px;
font-weight:600;
background:#fff;
border-bottom:1px solid #e5e5e5;
position:sticky;
top:0;
}

.container{
padding:12px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #d0d7de;
font-size:16px;
outline:none;
background:#fff;
}

.card{
background:#fff;
padding:14px;
border-radius:12px;
margin-top:10px;
border:1px solid #ececec;
box-shadow:0 1px 2px rgba(0,0,0,0.03);
}

.resultado{
cursor:pointer;
transition:0.2s;
}

.resultado:active{
background:#eef6ff;
}

#painel{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
border-top-left-radius:16px;
border-top-right-radius:16px;
box-shadow:0 -4px 20px rgba(0,0,0,0.08);
padding:16px;
display:none;
}

.btn-row{
display:flex;
gap:10px;
margin-top:10px;
}

button{
border:none;
border-radius:10px;
padding:14px;
font-size:15px;
cursor:pointer;
}

.azul{
background:#2f80ed;
color:#fff;
}

.cinza{
background:#e9ecef;
}

.verde{
background:#2ecc71;
color:#fff;
}

.vermelho{
background:#eb5757;
color:#fff;
}

.qtd{
text-align:center;
font-size:22px;
margin:10px 0;
}

#carrinho{
position:fixed;
right:12px;
bottom:12px;
width:260px;
background:#fff;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
padding:12px;
max-height:60vh;
overflow:auto;
}

.item{
font-size:13px;
border-bottom:1px solid #eee;
padding:6px 0;
}

.small{
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<header>📦 Estoque Pro</header>

<div class="container">

<input id="busca" placeholder="Buscar produto...">

<div id="resultados"></div>

</div>

<!-- PAINEL -->
<div id="painel">

<h3 id="nome"></h3>
<div class="small">Estoque: <span id="estoque"></span></div>

<div class="btn-row">
<button class="cinza" onclick="menos()">-</button>
<div class="qtd" id="qtd">1</div>
<button class="cinza" onclick="mais()">+</button>
</div>

<div class="btn-row">
<button class="verde" onclick="add('entrada')">Entrada</button>
<button class="vermelho" onclick="add('saida')">Saída</button>
</div>

<button class="cinza" onclick="fechar()">Fechar</button>

</div>

<!-- CARRINHO -->
<div id="carrinho">
<b>🛒 Carrinho</b>
<div id="listaCarrinho"></div>
<button class="azul" onclick="enviar()">Enviar tudo</button>
</div>

<script src="app.js"></script>

</body>
</html>
