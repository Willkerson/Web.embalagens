<input type="file" id="file" />
<button onclick="upload()">Enviar DANFE</button>

<script>
async function upload() {
  const file = document.getElementById("file").files[0];

  const content = await file.arrayBuffer();
  const base64 = btoa(String.fromCharCode(...new Uint8Array(content)));

  // 1. salva PDF no repo
  await fetch("https://api.github.com/repos/SEU_USER/SEU_REPO/contents/uploads/danfe.pdf", {
    method: "PUT",
    headers: {
      "Authorization": "Bearer SEU_GITHUB_TOKEN",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "upload danfe",
      content: base64
    })
  });

  // 2. dispara Actions
  await fetch("https://api.github.com/repos/SEU_USER/SEU_REPO/dispatches", {
    method: "POST",
    headers: {
      "Authorization": "Bearer SEU_GITHUB_TOKEN",
      "Accept": "application/vnd.github+json"
    },
    body: JSON.stringify({
      event_type: "process-danfe"
    })
  });

  alert("Enviado!");
}
</script>
