<!--
  danfe-painel.html — Cole dentro do #calcPanel
  CORREÇÕES aplicadas:
  - #danfe-resultado mantém o cabeçalho fixo no HTML
  - <div id="danfe-itens-lista"> e <div id="danfe-itens-btns"> recebem
    o conteúdo injetado pelo JS sem apagar o cabeçalho
  - Botões de salvar / copiar adicionados ao bloco #calc-resultado
    (cole esses botões no HTML do seu painel de calculadora)
-->

<!-- ══════════════════════════════════════════
     ESTILOS — cole no admin.css ou no <head>
     ══════════════════════════════════════════ -->
<style>
.danfe-card {
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin-bottom: 12px;
  background: #fff;
}
.danfe-drop {
  border: 2px dashed #ccc;
  border-radius: 8px;
  padding: 1.5rem 1rem;
  text-align: center;
  cursor: pointer;
  color: #888;
  font-size: 14px;
  transition: border-color .2s, background .2s;
  user-select: none;
}
.danfe-drop:hover,
.danfe-drop.over {
  border-color: #1D9E75;
  background: #f0faf6;
  color: #1D9E75;
}
.danfe-status-box {
  font-size: 13px;
  padding: 10px 12px;
  border-radius: 8px;
  margin-top: 8px;
}
.danfe-status-box.loading { background: #fffbeb; color: #92400e; }
.danfe-status-box.ok      { background: #e8f7f0; color: #085041; }
.danfe-status-box.err     { background: #fef2f2; color: #991b1b; }

#danfe-resultado { margin-top: 10px; }

.danfe-header-row,
.danfe-item-row {
  display: grid;
  grid-template-columns: 3fr 70px 110px 75px 70px;
  gap: 6px;
  align-items: center;
  padding: 5px 2px;
}
.danfe-header-row {
  font-size: 11px;
  font-weight: 600;
  color: #888;
  border-bottom: 1px solid #eee;
  padding-bottom: 6px;
  margin-bottom: 4px;
}
.danfe-item-row {
  border-bottom: 1px solid #f0f0f0;
}
.danfe-item-row input {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #ddd;
  border-radius: 6px;
  width: 100%;
  background: #fafafa;
}
.danfe-item-row input:focus {
  outline: none;
  border-color: #1D9E75;
  background: #fff;
}
.danfe-btn-primary {
  background: #1D9E75;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 20px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 500;
}
.danfe-btn-primary:hover { background: #0F6E56; }
.danfe-btn-sec {
  background: transparent;
  color: #666;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  cursor: pointer;
  margin-left: 6px;
}
.danfe-btn-sec:hover { background: #f5f5f5; }
</style>


<!-- ══════════════════════════════════════════
     PAINEL DANFE — cole dentro do #calcPanel
     ══════════════════════════════════════════ -->
<div id="danfe-painel" class="danfe-card">
  <div class="calc-sec-title" style="font-size:13px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">
    📄 Importar DANFE (PDF)
  </div>

  <div
    id="danfe-drop"
    class="danfe-drop"
    onclick="document.getElementById('danfe-input').click()"
    ondragover="event.preventDefault(); this.classList.add('over')"
    ondragleave="this.classList.remove('over')"
    ondrop="danfeDrop(event)"
  >
    <div style="font-size:28px;margin-bottom:6px">📄</div>
    <span id="danfe-drop-txt">Clique aqui ou arraste o PDF da DANFE</span><br>
    <span style="font-size:12px;color:#aaa">PDF · máx. 20 MB</span>
  </div>

  <input
    type="file"
    id="danfe-input"
    accept="application/pdf"
    style="display:none"
    onchange="danfeProcessar(this.files[0])"
  >

  <div id="danfe-status" style="display:none"></div>

  <!--
    #danfe-resultado fica sempre visível com o cabeçalho fixo.
    O JS injeta as linhas em #danfe-itens-lista e os botões em #danfe-itens-btns,
    sem apagar o cabeçalho.
  -->
  <div id="danfe-resultado" style="display:none">
    <div class="danfe-header-row">
      <span>Descrição</span>
      <span>Qtd</span>
      <span>Vlr unit. (R$)</span>
      <span>ICMS %</span>
      <span>IPI %</span>
    </div>
    <!-- Linhas injetadas pelo JS aqui ↓ -->
    <div id="danfe-itens-lista"></div>
    <!-- Botões de ação injetados pelo JS aqui ↓ -->
    <div id="danfe-itens-btns"></div>
  </div>
</div>


<!-- ══════════════════════════════════════════
     BOTÕES SALVAR / COPIAR no calc-resultado
     Cole DENTRO do seu #calc-resultado, após
     os campos de exibição do preço calculado.
     ══════════════════════════════════════════ -->
<!--
  Procure no seu HTML o bloco #calc-resultado e adicione
  os dois botões abaixo dentro dele, após #calc-breakdown:

  <div id="calc-resultado" style="display:none">
    ... seus campos de resultado ...
    <div id="calc-breakdown"></div>

    ✅ ADICIONE ISTO:
    <div style="display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;">
      <button class="calc-btn" onclick="calcAplicarPreco()">
        💾 Salvar no produto
      </button>
      <button class="calc-btn" onclick="calcCopiarPreco()">
        📋 Copiar preço
      </button>
    </div>
    <div id="calc-aviso" style="display:none; margin-top:8px; font-size:13px;
         padding:8px 12px; background:#e8f7f0; border-radius:8px; color:#085041;">
    </div>
  </div>
-->
