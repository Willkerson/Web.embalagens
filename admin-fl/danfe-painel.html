<!-- ══ ESTILOS (cole no admin.css ou num <style> no <head>) ══ -->
<style>
.danfe-card {
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin-bottom: 12px;
  background: #fff;
}
.danfe-drop {
  border: 2px dashed #ccc;
  border-radius: 8px;
  padding: 1.5rem 1rem;
  text-align: center;
  cursor: pointer;
  color: #888;
  font-size: 14px;
  transition: border-color .2s, background .2s;
  user-select: none;
}
.danfe-drop:hover,
.danfe-drop.over {
  border-color: #1D9E75;
  background: #f0faf6;
  color: #1D9E75;
}
.danfe-status-box {
  font-size: 13px;
  padding: 10px 12px;
  border-radius: 8px;
  margin-top: 8px;
}
.danfe-status-box.loading { background: #fffbeb; color: #92400e; }
.danfe-status-box.ok      { background: #e8f7f0; color: #085041; }
.danfe-status-box.err     { background: #fef2f2; color: #991b1b; }

#danfe-resultado { margin-top: 10px; }

/* Grid de itens */
.danfe-header-row,
.danfe-item-row {
  display: grid;
  grid-template-columns: 3fr 70px 110px 75px 70px;
  gap: 6px;
  align-items: center;
  padding: 5px 2px;
}
.danfe-header-row {
  font-size: 11px;
  font-weight: 600;
  color: #888;
  border-bottom: 1px solid #eee;
  padding-bottom: 6px;
  margin-bottom: 4px;
}
.danfe-item-row {
  border-bottom: 1px solid #f0f0f0;
}
.danfe-item-row input {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #ddd;
  border-radius: 6px;
  width: 100%;
  background: #fafafa;
}
.danfe-item-row input:focus {
  outline: none;
  border-color: #1D9E75;
  background: #fff;
}

/* Botões */
.danfe-btn-primary {
  background: #1D9E75;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 20px;
  font-size: 14px;
  cursor: pointer;
  margin-top: 12px;
  font-weight: 500;
}
.danfe-btn-primary:hover { background: #0F6E56; }
.danfe-btn-sec {
  background: transparent;
  color: #666;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  cursor: pointer;
  margin-top: 12px;
  margin-left: 6px;
}
.danfe-btn-sec:hover { background: #f5f5f5; }
</style>

<!-- ══ HTML — cole dentro do #calcPanel ══ -->
<div id="danfe-painel" class="danfe-card">
  <div class="calc-sec-title" style="font-size:13px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">
    📄 Importar DANFE (PDF)
  </div>

  <div
    id="danfe-drop"
    class="danfe-drop"
    onclick="document.getElementById('danfe-input').click()"
    ondragover="event.preventDefault(); this.classList.add('over')"
    ondragleave="this.classList.remove('over')"
    ondrop="danfeDrop(event)"
  >
    <div style="font-size:28px;margin-bottom:6px">📄</div>
    <span id="danfe-drop-txt">Clique aqui ou arraste o PDF da DANFE</span><br>
    <span style="font-size:12px;color:#aaa">PDF · máx. 10 MB</span>
  </div>

  <input
    type="file"
    id="danfe-input"
    accept="application/pdf"
    style="display:none"
    onchange="danfeProcessar(this.files[0])"
  >

  <div id="danfe-status" style="display:none"></div>

  <div id="danfe-resultado" style="display:none">
    <div class="danfe-header-row">
      <span>Descrição</span>
      <span>Qtd</span>
      <span>Vlr unit. (R$)</span>
      <span>ICMS %</span>
      <span>IPI %</span>
    </div>
    <!-- Itens injetados por admin-calc-danfe.js -->
  </div>
</div>
